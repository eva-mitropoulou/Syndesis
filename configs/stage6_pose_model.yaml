stage:
  name: stage6_pose_reranking_confidence
  version: 0.1.0

inputs:
  docked_poses: data/processed/stage3/docked_poses.parquet
  pose_rmsd: data/processed/stage3/pose_rmsd.parquet
  pose_sanity: data/processed/stage3/pose_sanity.parquet
  stage3_pose_labels: data/processed/stage3/stage3_pose_labels.parquet
  docking_task_metrics: data/processed/stage3/docking_task_metrics.parquet
  pose_score_table: data/processed/stage4/pose_score_table.parquet
  stage4_features: data/processed/stage4/stage6_pose_features_base.parquet
  rescoring_task_metrics: data/processed/stage4/rescoring_task_metrics.parquet
  interaction_recovery: data/processed/stage5/interaction_recovery.parquet
  final_pose_labels: data/processed/stage5/final_pose_labels.parquet
  docked_pose_fingerprints: data/processed/stage5/docked_pose_fingerprints.parquet
  binding_mode_clusters: data/processed/stage5/binding_mode_clusters.parquet
  stage5_interaction_features: data/processed/stage5/stage6_pose_features_interactions.parquet
  ligand_prep: data/processed/stage3/ligand_docking_prep.parquet
  receptor_ensemble: data/processed/stage2/receptor_ensemble_v1.parquet

paths:
  processed: data/processed/stage6
  models: models/stage6
  reports: reports

features:
  min_fingerprint_bit_frequency: 3
  keep_sparse_fingerprint_json: true
  training_feature_schema: models/stage6/feature_schema.json
  forbidden_patterns:
    - rmsd
    - native_reference
    - strict_native_like_flag
    - relaxed_native_like_flag
    - final_pose_label
    - stage3_pose_label
    - ifp_tanimoto_to_native
    - key_interaction_recall_native
    - key_interaction_precision_native
    - key_interaction_f1_native
    - transformed_reference_pose_flag

labels:
  # Pose-confidence target. "rmsd_native_like" (default) uses the RMSD-to-crystal
  # ground truth so the label is decoupled from the interaction-recovery features
  # (which are dropped by the leakage audit). "legacy_hybrid" restores the old
  # interaction-consistency + RMSD label for comparison only.
  label_definition: rmsd_native_like
  binary_positive_min_relevance: 1
  exclude_uncertain_from_classifier: false

splits:
  seed: 604
  primary_split_name: scaffold_holdout
  valid_fraction: 0.2
  test_fraction: 0.2

models:
  seed: 604
  n_jobs: 8
  ranker_estimators: 200
  classifier_estimators: 200
  early_stopping_rounds: 20
  confidence_thresholds: [0.3, 0.5, 0.7]
