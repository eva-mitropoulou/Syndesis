stage:
  name: stage7_candidate_library
  version: 0.1.0

inputs:
  cocrystal_benchmark: data/processed/stage1/egfr_cocrystal_benchmark.parquet
  native_interaction_fingerprints: data/processed/stage5/native_interaction_fingerprints.parquet
  stage6_model_selection: data/processed/stage6/model_selection_summary.parquet
  stage6_feature_schema: models/stage6/feature_schema.json

paths:
  raw: data/raw/stage7
  processed: data/processed/stage7
  reports: reports

known_ligands:
  uniprot_id: P00533
  chembl_activity_limit: 2000
  bindingdb_cutoff_nm: 10000
  bindingdb_timeout_seconds: 90
  bindingdb_max_bytes: 200000
  pubchem_enabled: false

vendor:
  enabled: true
  cartblanche_enabled: true
  cartblanche_query_smiles:
    - CCOc1cc2ncnc(Nc3ccc(F)c(Cl)c3)c2cc1OCC
    - CS(=O)(=O)CCNc1ncnc2ccc(Nc3ccc(Br)cc3)cc12
  cartblanche_distance: 2
  max_vendor_records: 50
  local_files: []

analogs:
  generated_files: []
  manual_files: []

filters:
  mw_min: 250
  mw_max: 650
  heavy_atom_min: 18
  heavy_atom_max: 50
  clogp_min: -1
  clogp_max: 6
  tpsa_min: 30
  tpsa_max: 160
  hbd_max: 4
  hba_max: 12
  rotatable_bonds_max: 12
  formal_charge_min: -1
  formal_charge_max: 2
  exclude_macrocycles: true

diversity:
  seed: 707
  smoke_test_size: 1000
  dev_screen_size: 10000
  main_screen_size: 100000

ligand_preparation:
  enabled: true
  ph_target: 7.4
  ph_window: 1.0
  max_conformers: 20
