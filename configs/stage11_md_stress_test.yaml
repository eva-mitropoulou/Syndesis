stage:
  name: stage11_md_stress_test
  version: 0.1.0

inputs:
  stage8_ranked_candidates: data/processed/stage8/ranked_candidates.parquet
  stage8_candidate_scores: data/processed/stage8/candidate_aggregate_scores.parquet
  stage9_acceptance: data/processed/stage9/analog_acceptance.parquet
  stage9_screening: data/processed/stage9/analog_screening_results.parquet
  stage10_strategy_metrics: data/processed/stage10/strategy_metrics.parquet
  key_interactions: data/processed/stage5/key_egfr_interactions.parquet

paths:
  processed: data/processed/stage11
  reports: reports
  md_root: data/processed/stage11/md_work
  user_cgenff_str_dir: data/inputs/stage11/cgenff_str

selection:
  max_quick_md_candidates: 3
  max_replicate_md_candidates: -1
  # Finalist MD scope: 3 known controls (always) + top-K accepted analogs (by
  # pose confidence) get the full replicated hardened MD. Remaining accepted
  # analogs are retained in the manifest as "selected_md_pending" (future work).
  max_finalist_analog_candidates: 3
  include_known_controls: true
  require_stage9_accepted_for_analogs: true

forcefield:
  engine: gromacs
  ligand_parameterization_backend: amber_gaff2_acpype
  gromacs_executable: /usr/local/gromacs/bin/gmx
  protein_ff: amber19sb
  ligand_ff: gaff2
  ligand_charge_model: am1bcc
  water_model: opc3
  ion_model: AMBER-compatible Na+/Cl-
  ambertools_prefix: .tools/stage11_amber
  antechamber_executable: .tools/stage11_amber/bin/antechamber
  parmchk2_executable: .tools/stage11_amber/bin/parmchk2
  acpype_executable: .tools/stage11_amber/bin/acpype
  openbabel_executable: .tools/stage11_amber/bin/obabel
  charmm36_path: tools/forcefields/charmm36-feb2026_cgenff-5.0.ff
  cgenff_executable: cgenff
  charmm2gmx_executable: tools/cgenff_charmm2gmx/cgenff_charmm2gmx.py
  salt_concentration_molar: 0.15
  box_type: dodecahedron
  box_padding_nm: 1.0

parameterization:
  low_penalty_max: 10
  medium_penalty_max: 50
  allow_high_penalty_flagship: false

md:
  temperature_k: 300
  pressure_bar: 1.0
  timestep_fs: 2
  minimization_max_steps: 50000
  nvt_ps: 500
  npt_ps: 1000
  quick_production_ns: 20
  replicate_production_ns: 100
  quick_replicates: 1
  finalist_replicates: 3
  gpu: auto
  gpu_id: "0"
  # Concurrent MD runs sharing the single GPU. These 102k-atom systems use only
  # ~4% GPU per run and are CPU-bound (GPU-resident update is unavailable due to
  # interdispersed constraints), so co-scheduling independent replicates
  # multiplies aggregate throughput; cores are partitioned into
  # `max_concurrent_runs` pinned blocks. Measured on this RTX 4090 (12 cores):
  # N=1 63 ns/day, N=3 83, N=4 120, N=6 204 (3.2x). 6 matches the 6 finalists
  # and 6x2 threads = 12 cores, so run all six at once.
  max_concurrent_runs: 6
  # Equilibration (min/NVT/NPT) is GPU-inefficient at high concurrency, so run
  # fewer at once with more threads each; production keeps the full 6-way.
  max_concurrent_equil: 2
  cpu_cores: 12
  pin_threads: true
  override_failed_equilibration: false
  # Thermostat coupling groups for tc-grps. Default matches the standard GROMACS
  # tutorial choice. For a rigorous protocol the ligand should be grouped with the
  # protein via a custom index group (e.g. "Protein_UNL Water_and_ions"), which
  # requires an index file with those groups defined.
  thermostat_groups: Protein Non-Protein

stability:
  ligand_rmsd_median_stable_angstrom: 3.0
  ligand_rmsd_p95_stable_angstrom: 5.0
  fraction_frames_inside_pocket_stable: 0.90
  key_interaction_occupancy_mean_stable: 0.50
  hinge_interaction_occupancy_stable: 0.30
  binding_mode_persistence_score_stable: 0.60
