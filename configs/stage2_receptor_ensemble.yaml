stage:
  name: stage2_receptor_ensemble
  version: 0.1.0

inputs:
  stage1_benchmark: data/processed/stage1/egfr_cocrystal_benchmark.parquet
  stage1_rejected: data/interim/stage1/rejected_complexes.parquet

paths:
  interim: data/interim/stage2
  processed: data/processed/stage2
  aligned_receptors: data/processed/stage2/aligned_receptors
  ensemble_receptors: data/processed/stage2/ensemble_receptors
  reports: reports

filters:
  allowed_quality_tiers:
    - Tier A
    - Tier B
  allow_tier_c_state_diversity: false
  max_resolution_angstrom: 3.0
  min_active_site_completeness_score: 0.75
  allow_mutants: true
  mutation_policy: metadata_only
  exclude_covalent: true
  exclude_allosteric: true

pocket:
  key_residues_uniprot:
    - 745
    - 762
    - 790
    - 793
    - 797
    - 855
    - 856
    - 857
  alignment_residues_uniprot:
    - 745
    - 762
    - 790
    - 793
    - 797
    - 855
    - 856
    - 857
  residue_mapping_policy: auth_seq_id_uniprot_fallback
  pocket_water_cutoff_angstrom: 5.0

clustering:
  random_seed: 13
  state_stratified_pocket_rmsd_threshold: 1.25
  feature_distance_threshold: 2.0
  global_pocket_rmsd_sanity_check: true

selection:
  target_ensemble_size_min: 4
  target_ensemble_size_max: 12
  preferred_ensemble_size_min: 6
  preferred_ensemble_size_max: 10
  max_receptors_per_state_stratum: 6
  min_receptors_per_major_state: 1
  include_reference_controls: true
  force_include_if_available:
    - 1M17
    - 1XKK
  force_exclude:
    - 4ZAU
  diversity_distance_threshold: 0.25
  prefer_tier_a: true
  allow_tier_b_if_unique_state: true
  allow_tier_c_if_unique_state: false

docking_box_suggestions:
  padding_angstrom: 8.0
  min_side_angstrom: 18.0
  max_side_angstrom: 30.0

runtime:
  workers: 8

