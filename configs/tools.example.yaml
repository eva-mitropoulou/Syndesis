# tools.example.yaml
#
# Template documenting the external, non-pip tools this workflow depends on.
# These are system/conda binaries (or Docker images), not Python packages, so
# they are NOT installed via `pip install`. Copy this file to `tools.yaml`,
# edit the placeholder paths to match your host, and reference it from the
# per-stage configs (e.g. stage3/stage4/stage8) as needed.
#
#   cp configs/tools.example.yaml configs/tools.yaml
#
# Replace every /path/to/... placeholder below with the real path on your host.

tools:
  # Docking engine (Uni-Dock). Install via conda/micromamba or build from source.
  unidock:
    executable: /path/to/unidock

  # OpenBabel — receptor/ligand PDBQT prep. Conda/system binary (not pip).
  obabel:
    executable: /path/to/obabel

  # GNINA — CNN-based rescoring. Available either as a local binary or the
  # official Docker image `gnina/gnina:latest`:
  #   docker run --rm --gpus all -v $PWD:/work gnina/gnina:latest gnina <args>
  gnina:
    executable: /path/to/gnina
    use_docker: false
    docker_image: gnina/gnina:latest

  # GROMACS — molecular dynamics engine. System/conda binary (not pip).
  gromacs:
    executable: /path/to/gmx
