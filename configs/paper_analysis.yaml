analysis_id: syndesis_jcheminformatics_atp_site_v1
target: EGFR

primary_interaction_prior:
  scope: reversible_noncovalent_atp_site
  included_native_receptors:
    - 1m17_a_aq4_999
    - 1xkk_a_fmm_91
    - 4hjo_a_aq4_1001
    - 5cav_a_4zq_1101
  excluded_native_receptors:
    - receptor_id: 6duk_c_jbj_1103
      reason: JBJ-04-125-02 is an allosteric ligand and cannot define an ATP-site interaction prior.

docking_receptor_ensemble:
  - 1m17_a_aq4_999
  - 1xkk_a_fmm_91
  - 4hjo_a_aq4_1001
  - 5cav_a_4zq_1101
  - 6duk_c_jbj_1103

ranking:
  pose_scope: top_unidock_pose_per_ligand_receptor
  receptor_aggregation: maximum
  formula: cnnscore_times_one_plus_lambda_recall
  lambda: 1.0
  rationale: Recall lies in [0,1], so lambda=1 bounds the interaction multiplier to [1,2].

statistics:
  primary_endpoint: ef1
  secondary_endpoints: [roc_auc, ef5, bedroc_80_5]
  top_set_rounding: round_n_times_fraction_minimum_one
  tie_handling: stable_input_order
  bootstrap_resamples: 2000
  permutation_resamples: 1000
  random_seed: 807
  permutation_nulls:
    - all_ligand
    - heavy_atom_count_decile
    - class_conditional_assignment

development_provenance:
  formula_endpoint_commit: cb7633b999659c1b7842e3f3a72eb6189c39280e
  formula_endpoint_timestamp: "2026-07-14T13:35:50+03:00"
  corrected_permutation_commit: 50c4d971379e5c38f05557390bc2a5d31cccef4f
  corrected_permutation_timestamp: "2026-07-14T15:24:17+03:00"
  final_graph_reconstruction_release_commit: 40290db9d6c9d0d08b1766f215f659a8ba45a137
  interpretation: EGFR was used for method development and retrospective evaluation; it is not described as an untouched prospective validation set.
