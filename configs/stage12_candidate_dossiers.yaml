stage: 12
stage_name: "Candidate evidence dossiers and final reporting"
inputs:
  stage5_key_interactions: data/processed/stage5/key_interactions.parquet
  stage6_metrics: data/processed/stage6/model_metrics.parquet
  stage6_calibration: data/processed/stage6/calibration_metrics.parquet
  stage6_feature_importance: data/processed/stage6/feature_importance.parquet
  stage7_master: data/processed/stage7/candidate_library_master.parquet
  stage8_ranked: data/processed/stage8/ranked_candidates.parquet
  stage8_aggregate: data/processed/stage8/candidate_aggregate_scores.parquet
  stage8_pose_decisions: data/processed/stage8/screening_pose_decisions.parquet
  stage8_interactions: data/processed/stage8/screening_interaction_features.parquet
  stage9_analog_candidates: data/processed/stage9/analog_candidates.parquet
  stage9_analog_acceptance: data/processed/stage9/analog_acceptance.parquet
  stage10_analog_benchmark: data/processed/stage10/analog_benchmark_master.parquet
  stage10_score_hacking: data/processed/stage10/score_hacking_cases.parquet
  stage11_md_metrics: data/processed/stage11/md_metrics.parquet
  stage11_md_stability: data/processed/stage11/md_pose_stability_labels.parquet
  stage11_parameterization_report: data/processed/stage11/ligand_parameterization_report.parquet
  stage12_sources: data/references/stage12_sources.yaml
outputs:
  processed_dir: data/processed/stage12
  figures_dir: figures/stage12
  dossier_dir: reports/final_candidate_dossiers
  reports_dir: reports
  model_cards_dir: reports/model_cards
  dataset_cards_dir: reports/dataset_cards
  reproducibility_bundle_dir: reports/reproducibility_bundle
selection:
  detailed_dossier_count: 5
  summary_table_count: 30
  include_known_controls_for_diagnostics: true
  include_rejected_analogs_for_negative_controls: true
non_claims:
  required:
    - "These candidates are computationally prioritized molecules, not experimentally confirmed EGFR inhibitors."
    - "Scores and poses are hypotheses requiring experimental validation."
    - "No claim is made about cellular potency, selectivity, pharmacokinetics, toxicity, or clinical relevance."
    - "Covalent EGFR inhibition is outside v1 scope."
  forbidden:
    - "confirmed inhibitor"
    - "active compound"
    - "validated hit"
    - "clinically relevant"
    - "selective EGFR inhibitor"
