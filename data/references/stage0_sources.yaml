    - RCSB PDB
    - Stamos et al.
  year: 2002
  source_type: structure/literature
  doi: 10.2210/pdb1M17/pdb
  url: https://www.rcsb.org/structure/1M17
  notes: Primary active-like EGFR ATP-site holo reference with erlotinib; associated paper DOI 10.1074/jbc.M207135200.
